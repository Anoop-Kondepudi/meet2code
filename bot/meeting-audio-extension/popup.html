<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        width: 260px;
        padding: 10px;
        font-family: Arial, sans-serif;
      }
      button {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      #startBtn {
        background-color: #4caf50;
        color: white;
      }
      #stopBtn {
        background-color: #f44336;
        color: white;
      }
      #stopBtn:disabled,
      #startBtn:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }
      #status {
        text-align: center;
        margin: 10px 0;
        font-size: 12px;
        color: #666;
      }
      #transcripts {
        margin-top: 8px;
        max-height: 180px;
        overflow: auto;
        font-size: 12px;
        background: #f7f7f7;
        padding: 8px;
        border-radius: 4px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <button id="startBtn">Start Streaming</button>
    <button id="stopBtn">Stop Streaming</button>
    <div id="status">Not streaming</div>
    <pre id="transcripts"></pre>
    <script src="popup.js"></script>
  </body>
</html>
