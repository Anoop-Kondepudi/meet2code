<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        width: 200px;
        padding: 10px;
        font-family: Arial, sans-serif;
      }
      button {
        width: 100%;
        padding: 8px;
        margin: 5px 0;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      #start {
        background-color: #4CAF50;
        color: white;
      }
      #stop {
        background-color: #f44336;
        color: white;
      }
      #stop:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }
      #start:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }
      .status {
        text-align: center;
        margin: 10px 0;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <button id="startBtn">Start Streaming</button>
    <button id="stopBtn">Stop Streaming</button>
    <div id="status">Not streaming</div>
    <pre id="transcripts"></pre>
    <script src="popup.js"></script>
  </body>
</html>
